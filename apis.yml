created: '2026-05-11'
modified: '2026-05-11'
specificationVersion: '0.19'
apis:
  - aid: factorial:developer-api
    name: Factorial Developer API
    description: >-
      Versioned REST API for managing employees, contracts, leaves, attendance
      shifts, time off, documents, and other HR resources in Factorial.
      Supports API key (Bearer token) and OAuth 2.0 authentication, with
      separate production and demo environments.
    humanURL: https://apidoc.factorialhr.com
    baseURL: https://api.factorialhr.com
    tags:
