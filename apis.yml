aid: factorial
name: Factorial
description: >-
  Factorial is a Spain-headquartered HRIS and human resources platform offering
  employee management, time tracking, attendance, time off, payroll,
  performance, recruitment, documents, and expenses for small and mid-sized
  businesses. The Factorial Developer API provides versioned REST endpoints
  (dated like 2026-04-01) for integrating with employees, leaves, contracts,
  attendance shifts, and other HR resources, with API key and OAuth 2.0
  authentication and both production and demo environments.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Human Resources
  - HRIS
  - Employee Management
  - Time Tracking
  - Payroll
  - Time Off
  - Performance Management
url: >-
